name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest tests/unit --cov --cov-report=xml

      - name: Integration mock tests
        run: uv run pytest tests/integration --cov --cov-append --cov-report=xml

      - name: Update LOC badge
        run: |
          python -c "
          import json, subprocess
          result = subprocess.run(['git', 'ls-files', 'packages/', 'apps/', 'tests/', 'scripts/', 'evaluation/'], capture_output=True, text=True)
          total = 0
          for f in result.stdout.strip().split('\n'):
              if f and f.endswith('.py'):
                  with open(f, encoding='utf-8', errors='ignore') as fh:
                      total += sum(1 for _ in fh)
          json.dump({'schemaVersion':1,'label':'lines of Python','message':f'{total:,}','color':'blue'}, open('loc.json','w'), indent=2)
          print(f'LOC: {total:,}')
          "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: RAG eval smoke gate
        run: >
          uv run python -m tests.eval.rag.run_ci_smoke
          --dataset tests/eval/datasets/rag_smoke.json
          --config tests/eval/config/rag_smoke_gate.json
          --report-dir tests/eval/reports

      - name: Commit LOC badge (if changed)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loc.json
          git diff --cached --quiet || (git commit -m "chore: update LOC badge [skip ci]" && git push)

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-smoke-reports
          path: tests/eval/reports/*.json
          if-no-files-found: ignore
          retention-days: 7

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [api, web, worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          push: true
          tags: |
            ghcr.io/chyinan/aegisrag-${{ matrix.image }}:latest
            ghcr.io/chyinan/aegisrag-${{ matrix.image }}:${{ github.sha }}
