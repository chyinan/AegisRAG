name: aegisrag

x-api-environment: &api-environment
  APP_ENV: local
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENABLE_DEV_AUTH_HEADERS: ${ENABLE_DEV_AUTH_HEADERS:-false}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rag_app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-rag_app}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
  MINIO_BUCKET: ${MINIO_BUCKET:-documents}
  MINIO_DOCUMENT_PREFIX: ${MINIO_DOCUMENT_PREFIX:-raw-documents}
  UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-26214400}
  INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-fake-embedding}
  EMBEDDING_DIM: ${EMBEDDING_DIM:-8}
  EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  EMBEDDING_PROVIDER_VERSION: ${EMBEDDING_PROVIDER_VERSION:-}
  EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-10}
  EMBEDDING_RETRY_BUDGET: ${EMBEDDING_RETRY_BUDGET:-2}
  EMBEDDING_QUEUE_NAME: ${EMBEDDING_QUEUE_NAME:-embedding}
  VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-pgvector}
  VECTOR_INDEX_DIM: ${VECTOR_INDEX_DIM:-8}
  VECTOR_DISTANCE_METRIC: ${VECTOR_DISTANCE_METRIC:-cosine}
  PGVECTOR_INDEX_TYPE: ${PGVECTOR_INDEX_TYPE:-hnsw}
  PGVECTOR_HNSW_M: ${PGVECTOR_HNSW_M:-16}
  PGVECTOR_HNSW_EF_CONSTRUCTION: ${PGVECTOR_HNSW_EF_CONSTRUCTION:-64}
  READINESS_TIMEOUT_SECONDS: ${READINESS_TIMEOUT_SECONDS:-2}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_ISSUER: ${JWT_ISSUER:-}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-}
  OPENWEBUI_SERVICE_TOKEN_HASHES_JSON: ${OPENWEBUI_SERVICE_TOKEN_HASHES_JSON:-[]}
  LLM_PROVIDER: ${LLM_PROVIDER:-fake}
  LLM_MODEL: ${LLM_MODEL:-fake-llm}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-10}
  LLM_RETRY_BUDGET: ${LLM_RETRY_BUDGET:-2}
  LLM_FAKE_RESPONSE_TEXT: ${LLM_FAKE_RESPONSE_TEXT:-Fake LLM response.}
  LLM_BASE_URL: ${LLM_BASE_URL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-}
  LLM_PROVIDER_VERSION: ${LLM_PROVIDER_VERSION:-}
  RERANK_PROVIDER: ${RERANK_PROVIDER:-llm}
  RERANK_MODEL: ${RERANK_MODEL:-deepseek-v4-flash}
  MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
  MILVUS_TOKEN: ${MILVUS_TOKEN:-}
  MILVUS_INDEX_TYPE: ${MILVUS_INDEX_TYPE:-HNSW}
  GRAPH_RAG_ENABLED: ${GRAPH_RAG_ENABLED:-false}
  GRAPH_RAG_MODEL: ${GRAPH_RAG_MODEL:-deepseek-v4-flash}
  GRAPH_RAG_MAX_HOPS: ${GRAPH_RAG_MAX_HOPS:-2}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-aegisrag-api}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rag_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: quay.io/minio/mc:latest
    entrypoint: ["/bin/sh", "-ec"]
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
    command:
      [
        "mc alias set local \"$${MINIO_ENDPOINT}\" \"$${MINIO_ACCESS_KEY}\" \"$${MINIO_SECRET_KEY}\" && mc mb --ignore-existing \"local/$${MINIO_BUCKET}\"",
      ]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  migration:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    environment:
      <<: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      <<: *api-environment
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      RAG_API_BASE_URL: ${RAG_API_BASE_URL:-http://api:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3100}:3100"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3100/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker-ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *api-environment
      WORKER_QUEUE_NAME: ingestion
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-embedding:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *api-environment
      WORKER_QUEUE_NAME: embedding
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3101}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- OpenTelemetry Collector + Jaeger (distributed tracing) ---
  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"    # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"  # OTLP gRPC
    restart: unless-stopped

  # --- Milvus vector database (enterprise scale) ---
  # Activated with profile: docker compose --profile milvus up
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    profiles: ["milvus"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.0
    profiles: ["milvus"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_GRPC_PORT:-9091}:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      - milvus
      - run
      - standalone
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  etcd-data:
  milvus-data:
