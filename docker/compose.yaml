name: aegisrag

x-api-environment: &api-environment
  APP_ENV: local
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENABLE_DEV_AUTH_HEADERS: ${ENABLE_DEV_AUTH_HEADERS:-false}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rag_app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-rag_app}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
  MINIO_BUCKET: ${MINIO_BUCKET:-documents}
  MINIO_DOCUMENT_PREFIX: ${MINIO_DOCUMENT_PREFIX:-raw-documents}
  UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-26214400}
  INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-fake-embedding}
  EMBEDDING_DIM: ${EMBEDDING_DIM:-8}
  EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  EMBEDDING_PROVIDER_VERSION: ${EMBEDDING_PROVIDER_VERSION:-}
  EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-10}
  EMBEDDING_RETRY_BUDGET: ${EMBEDDING_RETRY_BUDGET:-2}
  EMBEDDING_QUEUE_NAME: ${EMBEDDING_QUEUE_NAME:-embedding}
  VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-pgvector}
  VECTOR_INDEX_DIM: ${VECTOR_INDEX_DIM:-8}
  VECTOR_DISTANCE_METRIC: ${VECTOR_DISTANCE_METRIC:-cosine}
  PGVECTOR_INDEX_TYPE: ${PGVECTOR_INDEX_TYPE:-hnsw}
  PGVECTOR_HNSW_M: ${PGVECTOR_HNSW_M:-16}
  PGVECTOR_HNSW_EF_CONSTRUCTION: ${PGVECTOR_HNSW_EF_CONSTRUCTION:-64}
  READINESS_TIMEOUT_SECONDS: ${READINESS_TIMEOUT_SECONDS:-2}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_ISSUER: ${JWT_ISSUER:-}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-}
  OPENWEBUI_SERVICE_TOKEN_HASHES_JSON: ${OPENWEBUI_SERVICE_TOKEN_HASHES_JSON:-[]}
  LLM_PROVIDER: ${LLM_PROVIDER:-fake}
  LLM_MODEL: ${LLM_MODEL:-fake-llm}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-10}
  LLM_RETRY_BUDGET: ${LLM_RETRY_BUDGET:-2}
  LLM_FAKE_RESPONSE_TEXT: ${LLM_FAKE_RESPONSE_TEXT:-Fake LLM response.}
  LLM_BASE_URL: ${LLM_BASE_URL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-}
  LLM_PROVIDER_VERSION: ${LLM_PROVIDER_VERSION:-}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rag_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: quay.io/minio/mc:latest
    entrypoint: ["/bin/sh", "-ec"]
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
    command:
      [
        "mc alias set local \"$${MINIO_ENDPOINT}\" \"$${MINIO_ACCESS_KEY}\" \"$${MINIO_SECRET_KEY}\" && mc mb --ignore-existing \"local/$${MINIO_BUCKET}\"",
      ]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  migration:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    environment:
      <<: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      <<: *api-environment
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      RAG_API_BASE_URL: ${RAG_API_BASE_URL:-http://api:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3100}:3100"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3100/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker-ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *api-environment
      WORKER_QUEUE_NAME: ingestion
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-embedding:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *api-environment
      WORKER_QUEUE_NAME: embedding
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  open-webui-config-check:
    image: python:3.11-alpine
    profiles: ["open-webui"]
    environment:
      OPENWEBUI_PROVIDER_API_KEY: ${OPENWEBUI_PROVIDER_API_KEY:-}
      OPENWEBUI_SERVICE_TOKEN_HASHES_JSON: ${OPENWEBUI_SERVICE_TOKEN_HASHES_JSON:-[]}
      OPENWEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:-}
    command:
      [
        "sh",
        "-ec",
        "python -c \"import hashlib,json,os,sys; key=os.environ.get('OPENWEBUI_PROVIDER_API_KEY',''); secret=os.environ.get('OPENWEBUI_SECRET_KEY',''); raw=os.environ.get('OPENWEBUI_SERVICE_TOKEN_HASHES_JSON','[]'); placeholders={'','<replace_with_local_openwebui_provider_key>','<replace_with_local_openwebui_webui_secret_key>'}; assert key not in placeholders and secret not in placeholders; records=json.loads(raw); assert isinstance(records,list) and any(isinstance(r,dict) and r.get('token_sha256') == hashlib.sha256(key.encode()).hexdigest() for r in records)\"",
      ]
    restart: "no"

  open-webui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    profiles: ["open-webui"]
    environment:
      OPENAI_API_BASE_URL: ${OPENWEBUI_OPENAI_API_BASE_URL:-http://api:8000/v1}
      OPENAI_API_KEY: ${OPENWEBUI_PROVIDER_API_KEY:-}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY:-}
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      open-webui-config-check:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  open-webui-data:
