apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "aegisrag.fullname" . }}-secrets"
  labels:
    {{- include "aegisrag.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "postgres.auth.password is required" .Values.postgres.auth.password | quote }}
  minio-secret-key: {{ required "minio.auth.rootPassword is required" .Values.minio.auth.rootPassword | quote }}
  jwt-secret: {{ required "api.secrets.jwtSecret is required" .Values.api.secrets.jwtSecret | quote }}
  llm-api-key: {{ required "api.secrets.llmApiKey is required" .Values.api.secrets.llmApiKey | quote }}
  {{- if .Values.api.secrets.llmBaseUrl }}
  llm-base-url: {{ .Values.api.secrets.llmBaseUrl | quote }}
  {{- end }}
