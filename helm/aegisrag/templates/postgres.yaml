{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ include "aegisrag.fullname" . }}-postgres"
  labels:
    {{- include "aegisrag.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: 5432
  selector:
    {{- include "aegisrag.selectorLabels" . | nindent 4 }}
    component: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ include "aegisrag.fullname" . }}-postgres-data"
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "aegisrag.fullname" . }}-postgres"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "aegisrag.selectorLabels" . | nindent 6 }}
      component: postgres
  template:
    metadata:
      labels:
        {{- include "aegisrag.selectorLabels" . | nindent 8 }}
        component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ include "aegisrag.fullname" . }}-secrets"
                  key: postgres-password
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: "{{ include "aegisrag.fullname" . }}-postgres-data"
{{- end }}
